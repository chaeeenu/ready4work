spring:
  application:
    name: ready4work

# External API Configurations
weather:
  api:
    key: ${env.WEATHER_API_KEY}
    base-url: https://api.openweathermap.org

odsay:
  api:
    key: ${env.ODSAY_API_KEY}
    base-url: https://api.odsay.com/v1/api

kakao:
  api:
    key: ${env.KAKAO_REST_API_KEY}
    base-url: https://dapi.kakao.com

seoul:
  api:
    key: ${env.SEOUL_DATA_API_KEY}
    base-url: http://swopenAPI.seoul.go.kr/api/subway

datagokr:
  api:
    subway:
      alert:
        key: ${env.DATA_GO_KR_SUBWAY_ALERT_KEY}
        base-url: https://apis.data.go.kr/B553766/ntce
    bus:
      station:
        key: ${env.DATA_GO_KR_BUS_STATION_INFO_KEY}
        base-url: http://ws.bus.go.kr/api/rest/stationinfo
      arrival:
        key: ${env.DATA_GO_KR_BUS_ARRIVAL_INFO_KEY}
        base-url: http://ws.bus.go.kr/api/rest/arrive