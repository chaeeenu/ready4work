spring.application.name=got-to-work

# OpenWeatherMap API
weather.api.key=${env.WEATHER_API_KEY}
weather.api.base-url=https://api.openweathermap.org

# TMAP API
tmap.api.key=${env.TMAP_APP_KEY}
tmap.api.base-url=https://apis.openapi.sk.com

# Kakao Local API
kakao.api.key=${env.KAKAO_REST_API_KEY}
kakao.api.base-url=https://dapi.kakao.com

# Seoul Open Data API (Seoul Subway Arrival Information)
seoul.api.key=${env.SEOUL_DATA_API_KEY}
seoul.api.base-url=http://swopenAPI.seoul.go.kr/api/subway

# PUBLIC DATA PORTAL API (Seoul Subway Alert Information)
datagokr.api.key=${env.DATA_GO_KR_SERVICE_KEY}
datagokr.subway.base-url=https://apis.data.go.kr/B553766/ntce
